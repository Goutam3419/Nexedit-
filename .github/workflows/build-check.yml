name: Build Check

# Volume 15 — CI/CD. Har push/PR par project build hokar check hota hai —
# taaki koi broken code accidentally main branch me na chala jaaye.
# Real Firebase keys yahan nahi hain, isliye yeh sirf "code compile hota hai
# ya nahi" check karta hai, real Firebase se connect nahi hota.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Create dummy .env for build check
        run: |
          echo "VITE_FIREBASE_API_KEY=dummy" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=dummy" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=dummy" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=dummy" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=dummy" >> .env
          echo "VITE_FIREBASE_APP_ID=dummy" >> .env

      - name: Build
        run: npm run build
